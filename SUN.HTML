<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device, initial-scale=1.0">
    <title>Document</title>
    <style>
        #chocolate
        {
            width: 1cm;
            height: 1cm;
            position: relative;
            background-color: pink;
            border-style: double;
        }
    </style>
</head>
<body>
    <div id="chocolate">
        

    </div>
    <p>mouse over the space</p>
    <script>
        const box=document.getElementById("chocolate");
        let x=100;
        let y=100;
        const step=10;
        document.addEventListener("keydown",function (keys){
            if(keys.code=="ArrowDown"){
                y+=step;

            }
            if(keys.code=="ArrowUp"){
                y-=step;
            }

            box.style.left=x+"px";
            box.style.top=y+"px";
   
        });
        const candy=document.getElementById("chocolate");
        candy.addEventListener("mouseover",function()
    {
        candy.style.backgroundColor="blue";
    });
    candy.addEventListener("mouseout",function()
{
    candy.style.backgroundColor="pink";
    candy.innerText="Dairy milk";
});
    </script>
    
</body>
</html>
